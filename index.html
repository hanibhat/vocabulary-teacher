<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vokabeltrainer</title>
    <style>
      [x-cloak] {
        display: none !important;
      }

      .card-perspective {
        perspective: 1000px;
      }

      .flip-inner {
        display: grid;
        transition: transform 0.5s ease-in-out;
        transform-style: preserve-3d;
      }

      .flip-inner > * {
        grid-area: 1 / 1 / 2 / 2;
      }

      .flip-inner.flipped {
        transform: rotateY(180deg);
      }

      .flip-front,
      .flip-back {
        backface-visibility: hidden;
        border-radius: inherit;
      }

      .flip-back {
        transform: rotateY(180deg);
      }
    </style>
    <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png" />
    <link rel="android-chrome-192x192-icon" sizes="192x192" href="assets/android-chrome-192x192.png" />
    <link rel="android-chrome-512x512-icon" sizes="512x512" href="assets/android-chrome-512x512.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png" />
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="index.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  </head>
  <body class="min-h-screen bg-zinc-950 text-zinc-100">
    <main
      x-data="vocabularyApp()"
      class="mx-auto flex min-h-screen w-full max-w-5xl flex-col gap-6 px-4 py-6 sm:px-6 lg:px-8"
    >
      <header class="flex space-between items-center justify-between">
        <div class="flex items-center gap-3">
          <img
            src="assets/logo.png"
            alt="Vocabulary Teacher logo"
            class="h-12 w-12 rounded-md object-contain"
          />
          <button
            type="button"
            class="inline-flex min-h-9 min-w-9 items-center justify-center rounded-md border border-zinc-700 text-sm text-zinc-300 transition hover:border-zinc-500 hover:bg-zinc-800 focus:outline-none focus:ring-2 focus:ring-teal-400/20 disabled:cursor-not-allowed disabled:opacity-60"
            :disabled="loading"
            @click="refreshVocabulary()"
          >
            <svg
              x-show="!loading"
              x-cloak
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="h-4 w-4"
            >
              <polyline points="23 4 23 10 17 10"></polyline>
              <polyline points="1 20 1 14 7 14"></polyline>
              <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
            </svg>
            <span x-show="loading" x-cloak class="h-4 w-4">
              <svg
                class="h-4 w-4 animate-spin"
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
              >
                <circle
                  class="opacity-25"
                  cx="12"
                  cy="12"
                  r="10"
                  stroke="currentColor"
                  stroke-width="4"
                ></circle>
                <path
                  class="opacity-75"
                  fill="currentColor"
                  d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
                ></path>
              </svg>
            </span>
          </button>
        </div>
        <div class="flex items-center gap-3">
          <a class="text-sm text-zinc-400 transition hover:text-teal-300" href="privacy.html">Datenschutz</a>
        </div>
      </header>

      <section
        x-show="error"
        x-cloak
        class="rounded-lg border border-red-500/40 bg-red-950/60 p-4 text-sm text-red-100"
      >
        <p x-text="error"></p>
      </section>

      <section
        x-show="loading && entries.length"
        x-cloak
        class="sticky top-4 z-40 rounded-lg border border-teal-400/30 bg-teal-950/80 p-3 text-center text-sm text-teal-100 shadow-lg shadow-black/20"
      >
        Inhalte werden aktualisiert...
      </section>

      <div
        x-show="allEntries.length"
        x-cloak
        class="fixed bottom-5 right-5 z-50 flex flex-col items-end gap-3"
      >
        <form
          x-show="settingsOpen"
          x-cloak
          class="w-[min(calc(100vw-2.5rem),24rem)] rounded-lg border border-zinc-800 bg-zinc-900 p-4 shadow-2xl shadow-black/40"
          @submit.prevent="chooseRandomEntries"
        >
          <div class="mb-4 flex items-center justify-between gap-3">
            <h2 class="text-sm font-semibold text-zinc-100">Einstellungen</h2>
            <button
              type="button"
              class="inline-flex min-h-9 min-w-9 items-center justify-center rounded-md border border-zinc-700 text-sm text-zinc-300 transition hover:border-zinc-500 hover:bg-zinc-800"
              @click="settingsOpen = false"
            >
              X
            </button>
          </div>

          <div class="grid gap-3">
            <div>
              <label class="mb-1 block text-sm font-medium text-zinc-300" for="language-select"
                >Übersetzungssprache</label
              >
              <select
                id="language-select"
                x-model="targetLanguage"
                @change="setLanguage(targetLanguage)"
                class="min-h-11 w-full rounded-md border border-zinc-700 bg-zinc-950 px-3 text-sm text-zinc-100 outline-none transition focus:border-teal-400 focus:ring-2 focus:ring-teal-400/20"
              >
                <template x-for="lang in allLanguages" :key="lang.code">
                  <option :value="lang.code" x-text="lang.name"></option>
                </template>
              </select>
            </div>

            <div>
              <label class="mb-1 block text-sm font-medium text-zinc-300" for="category-select"
                >Kategorie</label
              >
              <select
                id="category-select"
                x-model="selectedCategory"
                @change="selectCategory"
                class="min-h-11 w-full rounded-md border border-zinc-700 bg-zinc-950 px-3 text-sm text-zinc-100 outline-none transition focus:border-teal-400 focus:ring-2 focus:ring-teal-400/20"
              >
                <option value="__all__">Alle Kategorien</option>
                <template x-for="category in allCategories" :key="category.id">
                  <option :value="category.name" x-text="category.name"></option>
                </template>
              </select>
            </div>

            <div>
              <label class="mb-1 block text-sm font-medium text-zinc-300" for="random-count">Anzahl</label>
              <input
                id="random-count"
                type="number"
                min="1"
                :max="availableEntryCount"
                x-model.number="randomCount"
                class="min-h-11 w-full rounded-md border border-zinc-700 bg-zinc-950 px-3 text-sm text-zinc-100 outline-none transition placeholder:text-zinc-500 focus:border-teal-400 focus:ring-2 focus:ring-teal-400/20"
              />
            </div>

            <div>
              <label class="mb-1 block text-sm font-medium text-zinc-300">Anzeigemodus</label>
              <div class="flex overflow-hidden rounded-lg border border-zinc-700 bg-zinc-950" role="radiogroup">
                <label class="flex-1 cursor-pointer">
                  <input type="radio" name="displayMode" value="visible" x-model="displayMode" @change="setDisplayMode('visible')" class="sr-only" />
                  <span
                    class="block px-3 py-2.5 text-center text-sm font-medium transition"
                    :class="displayMode === 'visible' ? 'bg-teal-500 text-zinc-950' : 'text-zinc-400 hover:text-zinc-200'"
                  >Immer anzeigen</span>
                </label>
                <label class="flex-1 cursor-pointer">
                  <input type="radio" name="displayMode" value="flip" x-model="displayMode" @change="setDisplayMode('flip')" class="sr-only" />
                  <span
                    class="block px-3 py-2.5 text-center text-sm font-medium transition"
                    :class="displayMode === 'flip' ? 'bg-teal-500 text-zinc-950' : 'text-zinc-400 hover:text-zinc-200'"
                  >Verdeckt</span>
                </label>
              </div>
            </div>
          </div>

          <div class="mt-4 grid gap-2 sm:grid-cols-2">
            <button
              type="submit"
              class="inline-flex min-h-11 items-center justify-center rounded-md bg-teal-500 px-4 text-sm font-medium text-zinc-950 transition hover:bg-teal-400 focus:outline-none focus:ring-2 focus:ring-teal-300/40"
              :disabled="loading"
            >
              Zufällig auswählen
            </button>
            <button
              type="button"
              x-show="hasActiveShuffle"
              x-cloak
              class="inline-flex min-h-11 items-center justify-center rounded-md border border-zinc-700 px-4 text-sm font-medium text-zinc-200 transition hover:border-zinc-500 hover:bg-zinc-800 focus:outline-none focus:ring-2 focus:ring-teal-400/20"
              @click="resetEntries"
            >
              Zurücksetzen
            </button>
          </div>
        </form>

        <button
          type="button"
          aria-label="Einstellungen"
          class="inline-flex min-h-14 min-w-14 items-center justify-center rounded-full bg-teal-500 text-zinc-950 shadow-xl shadow-black/40 transition hover:bg-teal-400 focus:outline-none focus:ring-4 focus:ring-teal-300/30"
          @click="settingsOpen = !settingsOpen"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="h-6 w-6"
            aria-hidden="true"
          >
            <path
              d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"
            ></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
        </button>
      </div>

      <section x-show="entries.length" x-cloak class="mx-auto flex w-full max-w-2xl flex-col gap-4 pb-24">
        <div
          class="flex flex-col gap-3 rounded-lg border border-zinc-800 bg-zinc-900 p-4 shadow-lg shadow-black/20 sm:flex-row sm:items-center sm:justify-between"
        >
          <div>
            <p class="text-sm text-zinc-400">
              <span x-text="filteredEntries.length"></span>
              <span x-text="filteredEntries.length === 1 ? 'Eintrag sichtbar' : 'Einträge sichtbar'"></span>
              <span>von <span x-text="availableEntryCount"></span> verfügbar</span>
            </p>
          </div>
          <input
            type="search"
            x-model.trim="query"
            placeholder="Filtern"
            class="min-h-10 w-full rounded-md border border-zinc-700 bg-zinc-950 px-3 text-sm text-zinc-100 outline-none transition placeholder:text-zinc-500 focus:border-teal-400 focus:ring-2 focus:ring-teal-400/20 sm:w-64"
          />
        </div>

        <template x-for="entry in filteredEntries" :key="entry.id">
          <div>
            <!-- Flip mode: hidden translation, tap to reveal -->
            <article
              x-show="displayMode === 'flip'"
              x-cloak
              x-data="{ flipped: false }"
              class="card-perspective min-h-56 rounded-lg border border-zinc-800 bg-zinc-900 shadow-lg shadow-black/20"
              :class="{ 'cursor-pointer': displayMode === 'flip' }"
            >
              <div
                class="flip-inner min-h-56"
                :class="{ flipped }"
                @click="flipped = !flipped"
              >
                <div class="flip-front flex flex-col p-5">
                  <div class="mb-8 flex items-center justify-between gap-3">
                    <p
                      class="text-[10px] font-semibold uppercase tracking-wide text-teal-300"
                      x-text="entry.category"
                    ></p>
                  </div>
                  <div class="flex flex-1 flex-col items-center justify-center text-center">
                    <h3
                      class="text-3xl font-semibold leading-tight text-zinc-50 sm:text-4xl"
                      x-text="entry.source"
                    ></h3>
                  </div>
                  <p class="mt-auto text-center text-xs text-zinc-600">Zum Umdrehen tippen</p>
                </div>
                <div class="flip-back flex flex-col p-5">
                  <div class="mb-8 flex items-center justify-between gap-3">
                    <p
                      class="text-[10px] font-semibold uppercase tracking-wide text-teal-300"
                      x-text="entry.category"
                    ></p>

                  </div>
                  <div class="flex flex-1 flex-col items-center justify-center text-center">
                    <h3
                      class="text-2xl font-semibold leading-tight text-teal-300 sm:text-3xl"
                      x-text="entry.translation"
                    ></h3>
                  </div>
                  <p
                    x-show="entry.sourceExample"
                    x-cloak
                    class="mt-8 border-t border-zinc-800 pt-4 text-base leading-5 text-zinc-200"
                    x-text="entry.sourceExample"
                  ></p>
                  <p
                    x-show="entry.translationExample"
                    x-cloak
                    class="mt-2 text-sm leading-5 text-zinc-400"
                    x-text="entry.translationExample"
                  ></p>
                </div>
              </div>
            </article>

            <!-- Visible mode: always show all content -->
            <article
              x-show="displayMode === 'visible'"
              x-cloak
              class="min-h-56 rounded-lg border border-zinc-800 bg-zinc-900 p-5 shadow-lg shadow-black/20"
            >
              <div class="mb-8 flex items-center justify-between gap-3">
                <p
                  class="text-[10px] font-semibold uppercase tracking-wide text-teal-300"
                  x-text="entry.category"
                ></p>
              </div>

              <div class="flex min-h-28 flex-col items-center justify-center text-center">
                <h3
                  class="text-3xl font-semibold leading-tight text-zinc-50 sm:text-4xl"
                  x-text="entry.source"
                ></h3>
                <p class="mt-3 text-base leading-6 text-zinc-400" x-text="entry.translation"></p>
              </div>

              <p
                x-show="entry.sourceExample"
                x-cloak
                class="mt-8 border-t border-zinc-800 pt-4 text-base leading-5 text-zinc-200"
                x-text="entry.sourceExample"
              ></p>
              <p
                x-show="entry.translationExample"
                x-cloak
                class="mt-2 text-sm leading-5 text-zinc-400"
                x-text="entry.translationExample"
              ></p>
            </article>
          </div>
        </template>

        <div
          x-show="!filteredEntries.length"
          x-cloak
          class="rounded-lg border border-zinc-800 bg-zinc-900 p-8 text-center text-sm text-zinc-400"
        >
          Keine Einträge passen zu diesem Filter.
        </div>
      </section>

      <section
        x-show="loading && !entries.length"
        x-cloak
        class="flex flex-1 items-center justify-center rounded-lg border border-dashed border-zinc-700 bg-zinc-900 p-8 text-center text-sm text-zinc-400"
      >
        Vokabeln werden geladen...
      </section>

      <section
        x-show="!entries.length && !loading && !error"
        class="flex flex-1 items-center justify-center rounded-lg border border-dashed border-zinc-700 bg-zinc-900 p-8 text-center text-sm text-zinc-400"
      >
        Keine Vokabeln geladen.
      </section>
    </main>
  </body>
</html>
